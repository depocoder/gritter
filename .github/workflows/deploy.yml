name: Deploy gritter

on:
  push:
    branches:
      - main
      - feature/deploy
  workflow_dispatch:

env:
  SSH_HOST: 144.31.118.62
  SSH_USER: devops

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/gritter
            git pull origin main
            docker compose up -d --build
            docker image prune -f
